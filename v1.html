<!-- OPTION C — Hardcoded Three.js Hamster Wheel -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hamster Wheel Carousel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #07060b; }
canvas { display: block; }
#vignette {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
  background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 22%, rgba(7,6,11,0.5) 60%, rgba(7,6,11,0.92) 100%);
}
</style>
</head>
<body>
<div id="vignette"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const RADIUS = 675;
  const TILE_COUNT = 9;
  const ANGLE_STEP = (Math.PI * 2) / TILE_COUNT;
  const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#2980b9','#e84393'];
  const TWO_PI = Math.PI * 2;

  function darken(hex, pct) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const f = 1 - pct / 100;
    return 'rgb(' + Math.round(r*f) + ',' + Math.round(g*f) + ',' + Math.round(b*f) + ')';
  }

  function createTileTexture(index, color) {
    const w = 520, h = 740, cr = 20;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');

    // Rounded rect path
    function roundedRect(x, y, ww, hh, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+ww-r, y);
      ctx.quadraticCurveTo(x+ww, y, x+ww, y+r);
      ctx.lineTo(x+ww, y+hh-r);
      ctx.quadraticCurveTo(x+ww, y+hh, x+ww-r, y+hh);
      ctx.lineTo(x+r, y+hh);
      ctx.quadraticCurveTo(x, y+hh, x, y+hh-r);
      ctx.lineTo(x, y+r);
      ctx.quadraticCurveTo(x, y, x+r, y);
      ctx.closePath();
    }

    // Fill with gradient
    roundedRect(0, 0, w, h, cr);
    ctx.clip();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color);
    grad.addColorStop(1, darken(color, 25));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Glass sheen overlay
    const sheen = ctx.createLinearGradient(0, 0, 0, h * 0.5);
    sheen.addColorStop(0, 'rgba(255,255,255,0.18)');
    sheen.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sheen;
    ctx.fillRect(0, 0, w, h);

    // Large centered number
    ctx.save();
    ctx.font = 'bold 140px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText(String(index + 1), w/2, h/2 - 20);
    ctx.restore();

    // Subtitle
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('TILE ' + (index + 1) + ' OF 9', w/2, h/2 + 80);

    // Inner border stroke
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 2;
    roundedRect(2, 2, w-4, h-4, cr-1);
    ctx.stroke();

    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    return tex;
  }

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x07060b);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 1, 5000);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 0, -RADIUS);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.insertBefore(renderer.domElement, document.getElementById('vignette'));

  const group = new THREE.Group();
  scene.add(group);

  const materials = [];

  for (let i = 0; i < TILE_COUNT; i++) {
    const tex = createTileTexture(i, COLORS[i]);
    const geo = new THREE.PlaneGeometry(310, 440);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 1, side: THREE.DoubleSide });
    materials.push(mat);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, Math.sin(i * ANGLE_STEP) * RADIUS, -Math.cos(i * ANGLE_STEP) * RADIUS);
    mesh.rotation.x = i * ANGLE_STEP;
    group.add(mesh);
  }

  // Interaction state
  let velocity = 0;
  let dragging = false;
  let lastY = 0;
  let lastTime = 0;
  let momentumRAF = 0;

  function onDown(y) {
    dragging = true;
    lastY = y;
    lastTime = performance.now();
    velocity = 0;
    if (momentumRAF) { cancelAnimationFrame(momentumRAF); momentumRAF = 0; }
  }

  function onMove(y) {
    if (!dragging) return;
    const now = performance.now();
    const dt = now - lastTime || 16;
    velocity = ((y - lastY) / dt) * 16 * 0.0025;
    group.rotation.x += velocity;
    lastY = y;
    lastTime = now;
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    momentum();
  }

  function momentum() {
    if (Math.abs(velocity) < 0.00003) { velocity = 0; return; }
    velocity *= 0.955;
    group.rotation.x += velocity;
    momentumRAF = requestAnimationFrame(momentum);
  }

  // Mouse events
  renderer.domElement.addEventListener('mousedown', function(e) { onDown(e.clientY); });
  window.addEventListener('mousemove', function(e) { onMove(e.clientY); });
  window.addEventListener('mouseup', function() { onUp(); });

  // Touch events
  renderer.domElement.addEventListener('touchstart', function(e) { onDown(e.touches[0].clientY); }, { passive: true });
  window.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientY); }, { passive: true });
  window.addEventListener('touchend', function() { onUp(); });

  // Wheel
  renderer.domElement.addEventListener('wheel', function(e) {
    e.preventDefault();
    const impulse = e.deltaY * 0.0008;
    velocity += impulse;
    group.rotation.x += impulse;
    if (!dragging && !momentumRAF) momentum();
  }, { passive: false });

  // Resize
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Render loop
  function animate() {
    requestAnimationFrame(animate);

    // Opacity falloff
    for (let i = 0; i < TILE_COUNT; i++) {
      let a = (i * ANGLE_STEP + group.rotation.x) % TWO_PI;
      if (a < 0) a += TWO_PI;
      const facing = Math.cos(a);
      const t = Math.max(0, (facing + 1) / 2);
      materials[i].opacity = 0.03 + Math.pow(t, 2.2) * 0.97;
    }

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
